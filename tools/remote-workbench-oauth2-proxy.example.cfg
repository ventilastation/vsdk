# Store the populated configuration at /etc/oauth2-proxy/workbench.cfg with
# mode 0600. Generate cookie_secret with: openssl rand -base64 32
# Create the Google OAuth web-client separately; its redirect URI is exactly:
# https://ventilastation-board.protocultura.net/oauth2/callback
provider = "google"
client_id = "replace-with-google-oauth-client-id"
client_secret = "replace-with-google-oauth-client-secret"
cookie_secret = "replace-with-32-byte-base64-cookie-secret"
redirect_url = "https://ventilastation-board.protocultura.net/oauth2/callback"
email_domains = ["*"]
upstreams = ["static://202"]
http_address = "127.0.0.1:4180"
reverse_proxy = true
set_xauthrequest = true
cookie_secure = true
cookie_samesite = "lax"
session_cookie_minimal = true

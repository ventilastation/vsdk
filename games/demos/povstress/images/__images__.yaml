# Assets copied from games/alecu/vixeous so the demo's sprites are the exact
# sizes of Vixeous's ship / bullet+missile / explosion, and its terrain tile is
# identical. Palette grouping mirrors Vixeous (action / world / hud).
palettegroups:
  action:
    - strip: ship.png
      frames: 4
    - strip: shots.png
      frames: 3
    - strip: explosion.png
      frames: 6
  world:
    - strip: terrain.png
      frames: 16
  hud:
    - strip: digits.png
      frames: 12
